<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Secret Hitler</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0a07; --bg2:#141008; --bg3:#1c1610; --paper:#f5ead0; --paper2:#ede0c0;
  --red:#8b1a1a; --red2:#b52020; --red3:#d42e2e;
  --gold:#c9922a; --gold2:#e8b84b; --gold3:#f5d080;
  --liberal:#1a3a8b; --liberal2:#2a5cc4;
  --fascist:#8b1a1a; --socialist:#1a6b2a; --socialist2:#2a9b3a;
  --text:#f0e6cc; --text2:#c8b898; --text3:#8a7a60;
  --border:#3a2e1e; --shadow:rgba(0,0,0,0.8);
  --font-body:'IM Fell English',serif;
  --font-ui:'Cinzel',serif;
  --font-display:'Cinzel Decorative',serif;
}
html.legivel{--font-body:'Inter',sans-serif;--font-ui:'Inter',sans-serif;--font-display:'Playfair Display',serif;}
html.legivel body{font-size:15px;}
html.legivel .alert{font-style:normal;}
html.legivel .role-desc{font-style:normal;}
html.legivel .text-muted{font-style:normal;}
html.legivel .btn{letter-spacing:.08em;}
html.legivel .phase-tag{letter-spacing:.15em;}
html.legivel .section-title{letter-spacing:.15em;}
html.legivel .cover-pass{letter-spacing:.15em;}
html.legivel .cover-btn{letter-spacing:.12em;}
html.legivel .card-title{letter-spacing:.15em;}
html.legivel input[type=text],html.legivel input[type=number]{font-size:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;}
body{background-image:radial-gradient(ellipse at 20% 20%,rgba(139,26,26,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(201,146,42,.06) 0%,transparent 60%);}
.screen{display:none;min-height:100vh;padding:16px;flex-direction:column;}
.screen.active{display:flex;}
.game-header{text-align:center;padding:24px 16px 16px;position:relative;}
.game-header::after{content:'';display:block;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);margin:12px auto 0;max-width:320px;}
.title-main{font-family:var(--font-display);font-size:clamp(20px,6vw,32px);font-weight:900;color:var(--gold2);text-shadow:0 0 30px rgba(232,184,75,.4),2px 2px 0 #000;letter-spacing:.05em;line-height:1.2;}
.title-sub{font-family:var(--font-ui);font-size:clamp(9px,2.5vw,13px);color:var(--text3);letter-spacing:.3em;text-transform:uppercase;margin-top:4px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:16px;margin:8px 0;position:relative;}
.card::before{content:'';position:absolute;inset:0;border-radius:4px;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none;}
.card-title{font-family:var(--font-ui);font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.btn{display:block;width:100%;padding:14px 20px;border:none;border-radius:3px;font-family:var(--font-ui);font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--red) 0%,var(--red2) 100%);color:var(--paper);box-shadow:0 4px 16px rgba(139,26,26,.4),inset 0 1px 0 rgba(255,255,255,.1);border:1px solid rgba(180,40,40,.5);}
.btn-gold{background:linear-gradient(135deg,#7a5a10 0%,var(--gold) 50%,#7a5a10 100%);color:#1a1000;box-shadow:0 4px 16px rgba(201,146,42,.3),inset 0 1px 0 rgba(255,255,255,.2);border:1px solid rgba(232,184,75,.4);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:active{background:rgba(255,255,255,.05);}
.btn-socialist{background:linear-gradient(135deg,#0f3a18 0%,var(--socialist) 50%,#0f3a18 100%);color:var(--paper);box-shadow:0 4px 16px rgba(26,107,42,.4);border:1px solid rgba(42,155,58,.4);}
.btn-sm{padding:10px 14px;font-size:11px;}
.btn+.btn{margin-top:8px;}
.input-group{margin:8px 0;}
.input-label{font-family:var(--font-ui);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;display:block;}
input[type=text],input[type=number]{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 12px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--gold);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(58,46,30,.5);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:14px;color:var(--text2);}
.toggle-desc{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.toggle{position:relative;width:48px;height:26px;flex-shrink:0;margin-left:12px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#2a1e10;border:1px solid var(--border);border-radius:26px;cursor:pointer;transition:.3s;}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--text3);border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--red);border-color:var(--red2);}
.toggle input:checked+.toggle-slider::before{transform:translateX(22px);background:var(--paper);}
.score-track{display:flex;gap:4px;align-items:center;margin:6px 0;}
.score-label{font-family:var(--font-ui);font-size:10px;letter-spacing:.1em;color:var(--text3);width:80px;flex-shrink:0;}
.score-pips{display:flex;gap:3px;flex:1;}
.pip{flex:1;height:20px;border-radius:2px;border:1px solid;transition:all .3s;}
.pip.liberal{border-color:#1a3a8b;background:rgba(26,58,139,.15);}
.pip.liberal.filled{background:linear-gradient(135deg,var(--liberal),var(--liberal2));border-color:var(--liberal2);box-shadow:0 0 6px rgba(42,92,196,.5);}
.pip.fascist{border-color:#5a1a1a;background:rgba(139,26,26,.15);}
.pip.fascist.filled{background:linear-gradient(135deg,var(--fascist),var(--red2));border-color:var(--red2);box-shadow:0 0 6px rgba(180,32,32,.5);}
.pip.socialist{border-color:#1a5a2a;background:rgba(26,107,42,.15);}
.pip.socialist.filled{background:linear-gradient(135deg,var(--socialist),var(--socialist2));border-color:var(--socialist2);box-shadow:0 0 6px rgba(42,155,58,.5);}
.role-display{text-align:center;padding:20px 16px;border-radius:4px;position:relative;overflow:hidden;}
.role-display.liberal{background:linear-gradient(160deg,#0a1a4a,#0f2560,#0a1a4a);border:2px solid rgba(42,92,196,.5);}
.role-display.fascist{background:linear-gradient(160deg,#2a0a0a,#4a1010,#2a0a0a);border:2px solid rgba(180,32,32,.5);}
.role-display.hitler{background:linear-gradient(160deg,#1a0808,#380c0c,#1a0808);border:2px solid rgba(232,184,75,.4);}
.role-display.socialista,.role-display.socialist{background:linear-gradient(160deg,#0a2a10,#0f3a18,#0a2a10);border:2px solid rgba(42,155,58,.5);}
.role-icon{font-size:52px;margin-bottom:8px;}
.role-name{font-family:var(--font-display);font-size:clamp(18px,6vw,26px);font-weight:700;margin-bottom:8px;}
.role-display.liberal .role-name{color:#7ab0ff;}
.role-display.fascist .role-name{color:#ff7070;}
.role-display.hitler .role-name{color:var(--gold2);}
.role-display.socialista .role-name,.role-display.socialist .role-name{color:#70e080;}
.role-desc{font-style:italic;color:var(--text2);font-size:14px;line-height:1.5;}
.role-allies{margin-top:12px;padding:10px;background:rgba(0,0,0,.3);border-radius:3px;font-size:13px;color:var(--text2);line-height:1.7;}
.role-allies strong{color:var(--gold2);font-style:normal;}
.cover-screen{background:var(--bg);text-align:center;padding:40px 24px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.cover-eyes{font-size:72px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
.cover-pass{font-family:var(--font-ui);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cover-name{font-family:var(--font-display);font-size:clamp(22px,7vw,36px);color:var(--gold2);text-shadow:0 0 20px rgba(232,184,75,.5);margin-bottom:24px;}
.cover-btn{background:rgba(20,16,8,.9);border:2px solid var(--border);border-radius:4px;padding:20px 32px;color:var(--text3);font-family:var(--font-ui);font-size:11px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;width:100%;max-width:320px;transition:all .2s;}
.cover-btn:active{border-color:var(--gold);color:var(--gold2);}
.vote-btn-row{display:flex;gap:10px;margin:8px 0;}
.vote-btn-row .btn{flex:1;}
.btn-ja{background:linear-gradient(135deg,#0f3a18,#1a6b2a);color:#90f0a0;border:1px solid rgba(42,155,58,.5);box-shadow:0 4px 12px rgba(26,107,42,.3);}
.btn-nein{background:linear-gradient(135deg,#3a0f0f,#6b1a1a);color:#f09090;border:1px solid rgba(180,32,32,.5);box-shadow:0 4px 12px rgba(139,26,26,.3);}
.player-item{display:flex;align-items:center;padding:12px;border-radius:3px;margin:4px 0;cursor:pointer;border:1px solid var(--border);background:rgba(0,0,0,.2);transition:all .15s;gap:12px;}
.player-item:active{background:rgba(201,146,42,.1);border-color:var(--gold);}
.player-item.dead{opacity:.4;text-decoration:line-through;cursor:default;pointer-events:none;}
.player-num{font-family:var(--font-ui);font-size:12px;color:var(--text3);width:20px;text-align:center;flex-shrink:0;}
.player-name{flex:1;font-size:16px;}
.policy-cards{display:flex;gap:8px;margin:12px 0;}
.policy-card{flex:1;padding:16px 8px;border-radius:4px;text-align:center;cursor:pointer;border:2px solid;transition:all .15s;}
.policy-card:active{transform:scale(.95);}
.policy-card.liberal{border-color:rgba(42,92,196,.5);background:rgba(26,58,139,.2);}
.policy-card.fascista,.policy-card.fascist{border-color:rgba(180,32,32,.5);background:rgba(139,26,26,.2);}
.policy-card.socialista,.policy-card.socialist{border-color:rgba(42,155,58,.5);background:rgba(26,107,42,.2);}
.policy-card.liberal.selected{border-color:var(--liberal2);background:rgba(42,92,196,.35);box-shadow:0 0 16px rgba(42,92,196,.4);}
.policy-card.fascista.selected,.policy-card.fascist.selected{border-color:var(--red2);background:rgba(180,32,32,.35);box-shadow:0 0 16px rgba(180,32,32,.4);}
.policy-icon{font-size:28px;margin-bottom:6px;}
.policy-type{font-family:var(--font-ui);font-size:10px;letter-spacing:.2em;text-transform:uppercase;}
.policy-card.liberal .policy-type{color:#7ab0ff;}
.policy-card.fascista .policy-type,.policy-card.fascist .policy-type{color:#ff8080;}
.policy-card.socialista .policy-type,.policy-card.socialist .policy-type{color:#70e080;}
.gov-bar{display:flex;gap:6px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:3px;padding:8px 10px;margin:4px 0;align-items:center;}
.gov-role{font-family:var(--font-ui);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);}
.gov-name{font-size:14px;color:var(--gold2);flex:1;}
.phase-header{text-align:center;padding:12px 0 4px;}
.phase-tag{display:inline-block;font-family:var(--font-ui);font-size:9px;letter-spacing:.3em;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text3);background:rgba(0,0,0,.3);margin-bottom:6px;}
.phase-title{font-family:var(--font-display);font-size:clamp(16px,5vw,22px);color:var(--gold2);text-shadow:0 0 16px rgba(232,184,75,.3);}
.chaos-counter{display:flex;gap:4px;align-items:center;}
.chaos-pip{width:18px;height:18px;border-radius:50%;border:1px solid #5a3a1a;background:rgba(90,58,26,.2);transition:all .3s;}
.chaos-pip.filled{background:var(--red2);border-color:var(--red3);box-shadow:0 0 6px rgba(212,46,46,.6);}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0;}
.section-title{font-family:var(--font-ui);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text3);margin:16px 0 8px;}
.alert{border-radius:3px;padding:12px 14px;font-size:13px;margin:8px 0;line-height:1.5;font-style:italic;}
.alert-warning{background:rgba(90,58,26,.3);border:1px solid #5a3a1a;color:#e8c87a;}
.alert-info{background:rgba(26,58,139,.25);border:1px solid rgba(42,92,196,.4);color:#a0c0f0;}
.alert-success{background:rgba(26,107,42,.25);border:1px solid rgba(42,155,58,.4);color:#90e0a0;}
.alert-danger{background:rgba(139,26,26,.25);border:1px solid rgba(180,32,32,.4);color:#f09090;}
.policy-announce{text-align:center;padding:24px 16px;border-radius:6px;margin:8px 0;}
.policy-announce.liberal{background:radial-gradient(ellipse,rgba(42,92,196,.3),rgba(26,58,139,.15));border:2px solid rgba(42,92,196,.6);}
.policy-announce.fascista,.policy-announce.fascist{background:radial-gradient(ellipse,rgba(180,32,32,.3),rgba(139,26,26,.15));border:2px solid rgba(180,32,32,.6);}
.policy-announce.socialista,.policy-announce.socialist{background:radial-gradient(ellipse,rgba(42,155,58,.3),rgba(26,107,42,.15));border:2px solid rgba(42,155,58,.6);}
.announce-emoji{font-size:56px;animation:drop .5s ease-out;}
@keyframes drop{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
.announce-type{font-family:var(--font-display);font-size:clamp(20px,6vw,28px);font-weight:700;margin-top:8px;}
.policy-announce.liberal .announce-type{color:#a0c8ff;}
.policy-announce.fascista .announce-type,.policy-announce.fascist .announce-type{color:#ff9090;}
.policy-announce.socialista .announce-type,.policy-announce.socialist .announce-type{color:#90f0a0;}
.num-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.num-btn{aspect-ratio:1;border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text2);font-family:var(--font-ui);font-size:20px;border-radius:3px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;width:100%;}
.num-btn:active{background:rgba(201,146,42,.2);border-color:var(--gold);color:var(--gold2);}
.victory-screen{text-align:center;padding:32px 16px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.victory-icon{font-size:80px;animation:victoryPop .6s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes victoryPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.victory-title{font-family:var(--font-display);font-size:clamp(24px,8vw,40px);font-weight:900;margin:16px 0 8px;animation:fadeUp .5s .2s ease-out both;}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.victory-reason{font-style:italic;color:var(--text2);font-size:15px;animation:fadeUp .5s .4s ease-out both;max-width:320px;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mt-8{margin-top:8px;} .mt-16{margin-top:16px;} .mb-8{margin-bottom:8px;}
.text-center{text-align:center;} .text-muted{color:var(--text3);font-size:13px;font-style:italic;}
.flex-row{display:flex;gap:8px;} .flex-row .btn{flex:1;}
.player-setup-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.player-setup-row input{flex:1;}
.del-btn{width:36px;height:36px;border:1px solid var(--border);background:rgba(139,26,26,.2);color:var(--text3);border-radius:3px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.del-btn:active{background:rgba(139,26,26,.5);color:#ff8080;}
/* lang selector */
.lang-select{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--font-ui);font-size:12px;padding:6px 10px;outline:none;cursor:pointer;transition:border-color .2s;}
.lang-select:focus{border-color:var(--gold);}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen active">
  <div class="game-header">
    <div class="title-main" id="hdr-title">Secret Hitler</div>
    <div class="title-sub" id="hdr-subtitle">—</div>
  </div>
  <div class="scroll-area" style="padding-bottom:24px;">
    <div class="card">
      <div class="card-title" id="cfg-card-title">⚙</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label" id="tog-socialist-label">—</div>
          <div class="toggle-desc" id="tog-socialist-desc">—</div>
        </div>
        <label class="toggle"><input type="checkbox" id="cfg-socialista"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row" id="pass-toggle-row">
        <div>
          <div class="toggle-label" id="tog-pass-label">—</div>
          <div class="toggle-desc" id="tog-pass-desc">—</div>
        </div>
        <label class="toggle"><input type="checkbox" id="cfg-passar" checked onchange="salvarConfigs()"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label" id="tog-font-label">—</div>
          <div class="toggle-desc" id="tog-font-desc">—</div>
        </div>
        <label class="toggle"><input type="checkbox" id="cfg-fonte" onchange="toggleFonte(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label" id="tog-lang-label">—</div>
        </div>
        <select id="lang-select" class="lang-select" onchange="onLangChange(this.value)"></select>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="players-card-title">👥</div>
      <div id="player-list"></div>
      <div class="flex-row mt-8">
        <button class="btn btn-ghost btn-sm" id="btn-add-player" onclick="addPlayer()">+</button>
        <button class="btn btn-ghost btn-sm" id="btn-remove-player" onclick="removePlayer()">−</button>
      </div>
      <div id="player-count-info" class="text-muted mt-8" style="font-size:12px;"></div>
    </div>
    <button class="btn btn-gold mt-16" id="btn-start" onclick="startGame()">⚔</button>
    <div id="setup-error" class="alert alert-danger mt-8" style="display:none;"></div>
  </div>
</div>

<!-- COVER SCREEN -->
<div id="screen-cover" class="screen">
  <div class="cover-screen">
    <div class="cover-eyes">🙈</div>
    <div class="cover-pass" id="cover-pass-label">—</div>
    <div class="cover-name" id="cover-name">—</div>
    <button class="cover-btn" id="cover-btn" onclick="coverContinue()">—</button>
  </div>
</div>

<!-- ROLE SCREEN -->
<div id="screen-role" class="screen">
  <div style="max-width:480px;margin:0 auto;width:100%;">
    <div class="phase-header mt-8">
      <div class="phase-tag" id="role-screen-tag">—</div>
    </div>
    <div id="role-card" class="role-display" style="margin:12px 0;"></div>
    <div id="role-allies"></div>
    <button class="btn btn-ghost mt-16" id="role-hide-btn" onclick="roleDone()">—</button>
  </div>
</div>

<!-- MAIN GAME SCREEN -->
<div id="screen-game" class="screen">
  <div style="max-width:480px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;">
    <div class="card" style="margin-top:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-family:var(--font-ui);font-size:10px;letter-spacing:.2em;color:var(--text3);"><span id="game-turn-label">—</span> <span id="stat-turno">1</span></span>
        <div class="chaos-counter" id="chaos-counter"></div>
      </div>
      <div class="score-track"><span class="score-label" id="track-lib-label">—</span><div class="score-pips" id="pips-liberal"></div></div>
      <div class="score-track"><span class="score-label" id="track-fas-label">—</span><div class="score-pips" id="pips-fascist"></div></div>
      <div class="score-track" id="track-socialist" style="display:none;"><span class="score-label" id="track-soc-label">—</span><div class="score-pips" id="pips-socialist"></div></div>
      <div class="divider" style="margin:8px 0 6px;"></div>
      <div id="gov-bar"></div>
      <div id="status-alerts" style="margin-top:4px;"></div>
    </div>

const AVAILABLE_LANGS = [
  { code: 'en',   label: 'English'   },
  { code: 'pt-BR', label: 'Português' },
];

let L = {};

function populateLangSelect() {
  const sel = document.getElementById('lang-select');
  sel.innerHTML = '';
  AVAILABLE_LANGS.forEach(lang => {
    const opt = document.createElement('option');
    opt.value = lang.code;
    opt.textContent = lang.label;
    sel.appendChild(opt);
  });
}

function loadLang(code) {
  if (LANG_DATA[code]) {
    L = LANG_DATA[code];
  } else {
    L = LANG_DATA['en']; // fallback
  }
  document.getElementById('lang-select').value = code;
  applyLangToSetup();
}

function onLangChange(code) {
  loadLang(code);
  salvarConfigs();
}

// Helper: replace {key} placeholders
function t(str, vars) {
  if (!str) return '';
  if (!vars) return str;
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] !== undefined ? vars[k] : '{' + k + '}');
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function vivos(){return G.jogadores.filter(j=>!G.mortos.includes(j));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function proxPresIdx(){let idx=(G.presidIdx+1)%G.jogadores.length,t=0;while(G.mortos.includes(G.jogadores[idx])){idx=(idx+1)%G.jogadores.length;if(++t>G.jogadores.length)break;}return idx;}
function podFasN(n){const tab=G.cfgSocialista?PF_SOC:PF_STD,l=tab[G.jogadores.length]||Array(6).fill(null);if(n===5)G.vetoOk=true;if(n<1||n>l.length)return null;return l[n-1];}
function podSocN(n){const l=getPodSoc(G.jogadores.length);if(n<1||n>l.length)return null;return l[n-1];}
function checkVit(){
  const lv=libVit(G.jogadores.length),sv=socVit(G.jogadores.length);
  if(G.polLib>=lv)return['Liberal',t(L.checkVictory.liberal,{n:lv}),'🕊️'];
  if(G.polFas>=FAS_VIT)return['Fascista',L.checkVictory.fascist,'🔥'];
  if(G.cfgSocialista&&G.polSoc>=sv)return['Socialista',t(L.checkVictory.socialist,{n:sv}),'✊'];
  return null;
}

function polIcon(p){return'<div class="policy-icon">'+(p==='Liberal'?'🔵':p==='Fascista'?'🔴':'🟢')+'</div>';}
function polEmoji(p){return p==='Liberal'?'🔵':p==='Fascista'?'🔴':'🟢';}
function partidoCor(p){return p==='Fascista'?'#ff8080':p==='Socialista'?'#80f090':'#80b0ff';}
function garantirDeck(){if(G.deck.length<3){G.deck=shuffle([...G.deck,...G.descarte]);G.descarte=[];}}

// ═══════════════ SETUP UI ═══════════════
function setupInit(){renderPlayerList();updateCountInfo();}
function renderPlayerList(){
  const l=document.getElementById('player-list');l.innerHTML='';
  G.jogadores.forEach((n,i)=>{
    const r=document.createElement('div');r.className='player-setup-row';
    const ph=t(L.setup&&L.setup.playerPlaceholder||'Player {n}',{n:i+1});
    r.innerHTML='<input type="text" value="'+n+'" placeholder="'+ph+'" oninput="G.jogadores['+i+']=this.value;salvarConfigs()">';
    l.appendChild(r);
  });
}
function addPlayer(){
  const max=G.cfgSocialista?13:10;
  if(G.jogadores.length>=max)return;
  const def=(L.setup&&L.setup.playerDefault)||'Player';
  G.jogadores.push(def+' '+(G.jogadores.length+1));
  renderPlayerList();updateCountInfo();salvarConfigs();
}
function removePlayer(){const min=G.cfgSocialista?6:5;if(G.jogadores.length<=min)return;G.jogadores.pop();renderPlayerList();updateCountInfo();salvarConfigs();}
function updateCountInfo(){
  const min=G.cfgSocialista?6:5,max=G.cfgSocialista?13:10,n=G.jogadores.length;
  const el=document.getElementById('player-count-info');
  el.textContent=t((L.setup&&L.setup.playerCount)||'{n} ({min}-{max})',{n,min,max});
  el.style.color=(n<min||n>max)?'#f09090':'var(--text3)';
}
function updateSocialistSetupVisibility(){
  const row=document.getElementById('pass-toggle-row');
  if(row) row.style.display = G.cfgSocialista ? '' : 'none';
}

document.getElementById('cfg-socialista').addEventListener('change',()=>{
  G.cfgSocialista=document.getElementById('cfg-socialista').checked;
  updateSocialistSetupVisibility();
  const min=G.cfgSocialista?6:5,max=G.cfgSocialista?13:10;
  const def=(L.setup&&L.setup.playerDefault)||'Player';
  while(G.jogadores.length<min)G.jogadores.push(def+' '+(G.jogadores.length+1));
  if(G.jogadores.length>max)G.jogadores=G.jogadores.slice(0,max);
  renderPlayerList();updateCountInfo();salvarConfigs();
});

// ═══════════════ START GAME ═══════════════
function startGame(){
  G.cfgSocialista=document.getElementById('cfg-socialista').checked;
  G.cfgPassar=document.getElementById('cfg-passar').checked;
  const inputs=document.querySelectorAll('#player-list input');
  const def=(L.setup&&L.setup.playerDefault)||'Player';
  G.jogadores=Array.from(inputs).map((inp,i)=>inp.value.trim()||(def+' '+(i+1)));
  salvarConfigs();
  const min=G.cfgSocialista?6:5,max=G.cfgSocialista?13:10,n=G.jogadores.length;
  const err=document.getElementById('setup-error');
  if(n<min||n>max){
    err.textContent=t((L.setup&&L.setup.errorCount)||'Invalid: {n} ({min}-{max})',{n,min,max});
    err.style.display='block';return;
  }
  err.style.display='none';
  Object.assign(G,{papeis:{},membros:{},presidIdx:0,chanceler:null,chairman:null,ultPresEleito:null,ultChanEleito:null,eleicoesNegadas:0,polLib:0,polFas:0,polSoc:0,hitlerZone:false,vetoOk:false,censura:false,mortos:[],investigados:[],deck:[],descarte:[],turno:1,fase:'nominar',poderPendente:null,hitlerNome:null,vencedor:null,eleicaoEspAtiva:false,eleicaoEspRetIdx:0,log:[],_chairmanViu:false,_legFase:null,_hitlerRecrutado:false});
  sortearCargos();
}

function sortearCargos(){
  const n=G.jogadores.length,dist=G.cfgSocialista?DIST_SOC:DIST_STD,[lib,fasTot,soc]=dist[n],fasN=fasTot-1;
  const papeis=shuffle([...Array(lib).fill('Liberal'),...Array(fasN).fill('Fascista'),'Hitler',...Array(soc).fill('Socialista')]);
  G.jogadores.forEach((nome,i)=>{
    const p=papeis[i];G.papeis[nome]=p;
    G.membros[nome]=p==='Liberal'?'Liberal':p==='Socialista'?'Socialista':'Fascista';
    if(p==='Hitler')G.hitlerNome=nome;
  });
  G.deck=montarBaralho();
  mostrarCargosQueue(true);
}
function montarBaralho(){const n=G.jogadores.length;let b;if(G.cfgSocialista){b=[...Array(5).fill('Liberal'),...Array(10).fill('Fascista'),...Array(8).fill('Socialista')];if(n===8){b.splice(b.indexOf('Fascista'),1);b.push('Liberal');}}else{b=[...Array(6).fill('Liberal'),...Array(11).fill('Fascista')];}return shuffle(b);}

// ═══════════════ MOSTRAR CARGOS ═══════════════
function mostrarCargosQueue(mostrarAliados){
  const n=G.jogadores.length,inicio=Math.floor(Math.random()*n);
  G._roleQueue=G.jogadores.map((_,i)=>G.jogadores[(inicio+i)%n]);
  G._roleIdx=0;G._mostrarAliados=mostrarAliados;
  nextRoleCard();
}
function nextRoleCard(){
  if(G._roleIdx>=G._roleQueue.length){showScreen('screen-game');renderGame();return;}
  const nome=G._roleQueue[G._roleIdx];
  showCover(nome,L.cover.seeRole,()=>showRoleCard(nome));
}
function showRoleCard(nome){
  const papel=G.papeis[nome],n=G.jogadores.length;
  let cls=papel.toLowerCase(),icon,desc,allies='';
  const rl=L.role;
  if(papel==='Liberal'){
    icon='🕊️';desc=rl.liberal.desc;
  } else if(papel==='Hitler'){
    icon='☠️';
    if(G._mostrarAliados&&n<=6){
      const fas=G.jogadores.filter(j=>G.papeis[j]==='Fascista');
      desc=rl.hitler.descKnows;
      allies='<strong>'+rl.alliesFascistsLabel+'</strong> '+(fas.join(', ')||rl.none);
    } else {
      desc=rl.hitler.descBlind;
    }
    if(G._hitlerRecrutado)allies+=(allies?'<br>':'')+'<span style="color:#ffcc44;">'+rl.hitler.hitlerRecruited+'</span>';
  } else if(papel==='Fascista'){
    icon='🔥';
    if(G._mostrarAliados){
      const outros=G.jogadores.filter(j=>G.papeis[j]==='Fascista'&&j!==nome);
      desc=rl.fascist.desc;
      allies='<strong>'+rl.alliesHitler+'</strong> '+G.hitlerNome+'<br><strong>'+rl.alliesFascists+'</strong> '+(outros.join(', ')||rl.none);
    } else {
      desc=rl.fascist.descBlind;
    }
  } else {
    icon='✊';cls='socialista';
    if(G._mostrarAliados){
      const outros=G.jogadores.filter(j=>G.papeis[j]==='Socialista'&&j!==nome);
      desc=rl.socialist.desc;
      allies=outros.length?'<strong>'+rl.alliesSocialists+'</strong> '+outros.join(', '):rl.socialist.alone;
    } else {
      const outros=G.jogadores.filter(j=>G.membros[j]==='Socialista'&&j!==nome);
      desc=rl.socialist.descBlind;
      if(outros.length)allies='<strong>'+rl.alliesSocialistsLabel+'</strong> '+outros.join(', ');
    }
  }
  const roleName = rl[papel==='Hitler'?'hitler':papel==='Fascista'?'fascist':papel==='Socialista'?'socialist':'liberal'].name;
  document.getElementById('role-card').className='role-display '+cls;
  document.getElementById('role-card').innerHTML='<div class="role-icon">'+icon+'</div><div class="role-name">'+roleName+'</div><div class="role-desc">'+desc+'</div>';
  const ae=document.getElementById('role-allies');
  ae.innerHTML=allies?'<div class="role-allies">'+allies+'</div>':'';
  showScreen('screen-role');
}
function roleDone(){G._roleIdx++;nextRoleCard();}

// ═══════════════ COVER ═══════════════
function showCover(nome,instrucao,cb){
  G._coverCb=cb;
  document.getElementById('cover-name').textContent=nome;
  document.getElementById('cover-btn').textContent=instrucao?'[ '+instrucao+' ]':L.cover.press;
  showScreen('screen-cover');
}
function coverContinue(){if(G._coverCb){const cb=G._coverCb;G._coverCb=null;cb();}}

// ═══════════════ RENDER GAME ═══════════════
function renderGame(){
  document.getElementById('stat-turno').textContent=G.turno;
  const ch=document.getElementById('chaos-counter');ch.innerHTML='';
  for(let i=0;i<3;i++){const p=document.createElement('div');p.className='chaos-pip'+(i<G.eleicoesNegadas?' filled':'');ch.appendChild(p);}
  const lv=libVit(G.jogadores.length),sv=socVit(G.jogadores.length);
  renderPips('pips-liberal',G.polLib,lv,'liberal');
  renderPips('pips-fascist',G.polFas,FAS_VIT,'fascist');
  if(G.cfgSocialista){document.getElementById('track-socialist').style.display='';renderPips('pips-socialist',G.polSoc,sv,'socialist');}
  const pres=G.jogadores[G.presidIdx];
  let gov='<div class="gov-bar"><div><div class="gov-role">'+L.game.presLabel+'</div><div class="gov-name">'+pres+'</div></div></div>';
  if(G.chanceler)gov+='<div class="gov-bar"><div><div class="gov-role">'+L.game.chanLabel+'</div><div class="gov-name">'+G.chanceler+'</div></div></div>';
  if(G.cfgSocialista&&G.chairman)gov+='<div class="gov-bar"><div><div class="gov-role">'+L.game.chairLabel+'</div><div class="gov-name">'+G.chairman+'</div></div></div>';
  document.getElementById('gov-bar').innerHTML=gov;
  let alerts='';
  if(G.hitlerZone)alerts+='<div class="alert alert-warning" style="padding:6px 10px;font-size:12px;margin:2px 0;">'+L.game.hitlerZone+'</div>';
  if(G.vetoOk)alerts+='<div class="alert alert-info" style="padding:6px 10px;font-size:12px;margin:2px 0;">'+L.game.vetoAvail+'</div>';
  if(G.censura)alerts+='<div class="alert alert-danger" style="padding:6px 10px;font-size:12px;margin:2px 0;">'+L.game.censorActive+'</div>';
  if(G.mortos.length)alerts+='<div class="alert" style="padding:6px 10px;font-size:12px;margin:2px 0;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text3);">💀 '+G.mortos.join(', ')+'</div>';
  document.getElementById('status-alerts').innerHTML=alerts;
  renderFase();
}
function renderPips(id,filled,total,type){const el=document.getElementById(id);el.innerHTML='';for(let i=0;i<total;i++){const p=document.createElement('div');p.className='pip '+type+(i<filled?' filled':'');el.appendChild(p);}}

// ═══════════════ FASES ═══════════════
function renderFase(){
  const c=document.getElementById('phase-content');
  if(G.fase==='nominar')renderNominar(c);
  else if(G.fase==='votar')renderVotar(c);
  else if(G.fase==='_chairman')renderEscolherChairman(c);
  else if(G.fase==='legislativa')renderLegislativa(c);
  else if(G.fase==='poder')renderPoder(c);
  else if(G.fase==='proximo')avancarTurno();
}

// ── NOMINAR ──
function renderNominar(c){
  const pres=G.jogadores[G.presidIdx],v=vivos();
  let elegiv=v.filter(j=>j!==pres&&j!==G.ultPresEleito&&j!==G.ultChanEleito);
  if(v.length<=5)elegiv=v.filter(j=>j!==pres&&j!==G.ultChanEleito);
  const ln=L.nominate;
  c.innerHTML='<div class="phase-header"><div class="phase-tag">'+ln.phase+'</div><div class="phase-title">'+ln.title+'</div></div>'
    +'<div class="alert alert-info mt-8">'+t(ln.prompt,{pres})+'</div>'
    +'<div class="section-title">'+ln.eligible+'</div>'
    +(elegiv.length?elegiv.map(j=>'<div class="player-item" onclick="escolherChanceler(\''+esc(j)+'\')"><div class="player-num">'+L.misc.arrowBtn+'</div><div class="player-name">'+j+'</div></div>').join('')
    :'<div class="alert alert-danger">'+ln.noEligible+'</div>');
}
function escolherChanceler(nome){G.chanceler=nome;G.fase='votar';logE('Chan:'+nome);renderGame();}

// ── VOTAR ──
function renderVotar(c){
  const lv=L.vote;
  c.innerHTML='<div class="phase-header"><div class="phase-tag">'+lv.phase+'</div><div class="phase-title">'+lv.title+'</div></div>'
    +'<div class="alert alert-info mt-8" style="font-style:normal;">'+lv.instruction+'</div>'
    +'<div class="section-title mt-16">'+lv.result+'</div>'
    +'<div class="vote-btn-row"><button class="btn btn-ja" onclick="resolverVoto(true)">'+lv.approved+'<br><small>'+lv.approvedSub+'</small></button>'
    +'<button class="btn btn-nein" onclick="resolverVoto(false)">'+lv.rejected+'<br><small>'+lv.rejectedSub+'</small></button></div>';
}
function resolverVoto(ap){
  if(ap){
    if(G.hitlerZone&&G.papeis[G.chanceler]==='Hitler'){
      G.vencedor='Fascista';logE('Hitler eleito!');
      showVictory('Fascista',t(L.checkVictory.hitlerElected,{name:G.chanceler}),'☠️');return;
    }
    G.ultPresEleito=G.jogadores[G.presidIdx];G.ultChanEleito=G.chanceler;G.eleicoesNegadas=0;logE('Gov ok.');
    if(G.cfgSocialista&&!G.censura){const cand=vivos().filter(j=>j!==G.ultPresEleito&&j!==G.chanceler);if(cand.length){G.fase='_chairman';renderGame();return;}}
    G.fase='legislativa';renderGame();
  }else{
    G.chanceler=null;G.chairman=null;G.eleicoesNegadas++;
    logE(t(L.chaos.electionDenied,{n:G.eleicoesNegadas}));
    if(G.eleicoesNegadas>=3)politicaCaotica();else{G.presidIdx=proxPresIdx();G.turno++;G.fase='nominar';renderGame();}
  }
}
function renderEscolherChairman(c){
  const cand=vivos().filter(j=>j!==G.ultPresEleito&&j!==G.chanceler);
  const lc=L.chairman;
  c.innerHTML='<div class="phase-header"><div class="phase-tag">'+lc.phase+'</div><div class="phase-title">'+lc.title+'</div></div>'
    +'<div class="alert alert-info mt-8">'+t(lc.prompt,{chan:G.chanceler})+'</div>'
    +cand.map(j=>'<div class="player-item" onclick="escolherChairman(\''+esc(j)+'\')"><div class="player-num">'+L.misc.arrowBtn+'</div><div class="player-name">'+j+'</div></div>').join('');
}
function escolherChairman(nome){G.chairman=nome;G.fase='legislativa';renderGame();}

// ── LEGISLATIVA ──
let _mao=[];
function renderLegislativa(c){
  garantirDeck();
  const ll=L.legislative;
  if(G.cfgSocialista&&G.chairman&&!G.censura&&!G._chairmanViu){
    c.innerHTML='<div class="phase-header"><div class="phase-tag">'+ll.chairmanPhase+'</div><div class="phase-title">'+ll.chairmanTitle+'</div></div>'
      +'<div class="alert alert-info mt-8">'+ll.chairmanInfo+'</div>'
      +'<button class="btn btn-ghost mt-8" onclick="chairmanEspiar()">'+t(ll.chairmanBtn,{chair:G.chairman})+'</button>';
    return;
  }
  if(!G._legFase)G._legFase='pres_start';
  if(G._legFase==='pres_start'){
    c.innerHTML='<div class="phase-header"><div class="phase-tag">'+ll.presPhase+'</div><div class="phase-title">'+ll.presTitle+'</div></div>'
      +'<button class="btn btn-ghost mt-8" onclick="presLegStart()">'+t(ll.presBtn,{pres:G.jogadores[G.presidIdx]})+'</button>';
  }
}
function chairmanEspiar(){
  garantirDeck();const topo=G.deck[0];
  const ll=L.legislative;
  showCover(G.chairman,ll.chairmanPhase,()=>{
    document.getElementById('phase-content').innerHTML=
      '<div class="phase-header"><div class="phase-tag">'+ll.chairmanPhase+'</div><div class="phase-title">'+ll.chairmanResult+'</div></div>'
      +'<div class="policy-cards mt-8"><div class="policy-card '+topo.toLowerCase()+'">'+polIcon(topo)+'<div class="policy-type">'+polName(topo)+'</div></div></div>'
      +'<div class="text-muted mt-8">'+ll.chairmanSecret+'</div>'
      +'<button class="btn btn-ghost mt-16" onclick="chairmanFez()">'+ll.chairmanHide+'</button>';
    showScreen('screen-game');
  });
}
function chairmanFez(){G._chairmanViu=true;G._legFase='pres_start';renderGame();}
function presLegStart(){
  garantirDeck();_mao=G.deck.splice(0,3);
  const ll=L.legislative,pres=G.jogadores[G.presidIdx];
  showCover(pres,ll.presCover,()=>{
    document.getElementById('phase-content').innerHTML=
      '<div class="phase-header"><div class="phase-tag">'+ll.presPhase+'</div><div class="phase-title">'+ll.presTitle+'</div></div>'
      +'<div class="alert alert-warning mt-8">'+ll.presPrompt+'</div>'
      +'<div class="policy-cards mt-8">'+_mao.map((p,i)=>'<div class="policy-card '+p.toLowerCase()+'" onclick="presDescarta('+i+')">'+polIcon(p)+'<div class="policy-type">'+polName(p)+'</div></div>').join('')+'</div>';
    showScreen('screen-game');
  });
}
function presDescarta(i){
  const ll=L.legislative;
  G.descarte.push(_mao[i]);_mao.splice(i,1);G._legFase='chan';
  showCover(G.chanceler,ll.chanCover,()=>{
    let vetoBtn=G.vetoOk?'<button class="btn btn-ghost mt-8" onclick="chanVetoPropoe()">'+ll.vetoBtn+'</button>':'';
    document.getElementById('phase-content').innerHTML=
      '<div class="phase-header"><div class="phase-tag">'+ll.chanPhase+'</div><div class="phase-title">'+ll.chanTitle+'</div></div>'
      +'<div class="alert alert-warning mt-8">'+ll.chanPrompt+'</div>'
      +'<div class="policy-cards mt-8">'+_mao.map((p,i)=>'<div class="policy-card '+p.toLowerCase()+'" onclick="chanEnuncia('+i+')">'+polIcon(p)+'<div class="policy-type">'+polName(p)+'</div></div>').join('')+'</div>'
      +vetoBtn;
    showScreen('screen-game');
  });
}
function chanEnuncia(i){const e=_mao[i];_mao.splice(i,1);G.descarte.push(_mao[0]);G._chairmanViu=false;G._legFase=null;anunciarPolitica(e);}
function chanVetoPropoe(){
  const ll=L.legislative,pres=G.jogadores[G.presidIdx];
  document.getElementById('phase-content').innerHTML=
    '<div class="phase-header"><div class="phase-tag">'+ll.vetoPhase+'</div><div class="phase-title">'+ll.vetoTitle+'</div></div>'
    +'<div class="alert alert-warning mt-8">'+t(ll.vetoPrompt,{pres})+'</div>'
    +'<div class="vote-btn-row mt-16"><button class="btn btn-ja" onclick="resVeto(true)">'+ll.vetoAccept+'</button><button class="btn btn-nein" onclick="resVeto(false)">'+ll.vetoDecline+'</button></div>';
}
function resVeto(aceito){
  const ll=L.legislative;
  if(aceito){G.descarte.push(..._mao);G.eleicoesNegadas++;logE('Veto ok.');G._chairmanViu=false;G._legFase=null;if(G.eleicoesNegadas>=3)politicaCaotica();else avancarTurno();}
  else{
    document.getElementById('phase-content').innerHTML=
      '<div class="phase-header"><div class="phase-tag">'+ll.chanPhase+'</div><div class="phase-title">'+ll.vetoRejectedTitle+'</div></div>'
      +'<div class="alert alert-danger mt-8">'+ll.vetoRejectedMsg+'</div>'
      +'<div class="policy-cards mt-8">'+_mao.map((p,i)=>'<div class="policy-card '+p.toLowerCase()+'" onclick="chanEnuncia('+i+')">'+polIcon(p)+'<div class="policy-type">'+polName(p)+'</div></div>').join('')+'</div>';
  }
}
function anunciarPolitica(pol){
  const ll=L.legislative;
  document.getElementById('phase-content').innerHTML=
    '<div class="phase-header"><div class="phase-tag">'+ll.announcedPhase+'</div></div>'
    +'<div class="policy-announce '+pol.toLowerCase()+' mt-8"><div class="announce-emoji">'+polEmoji(pol)+'</div><div class="announce-type">'+polName(pol).toUpperCase()+'</div></div>'
    +'<button class="btn btn-ghost mt-16" onclick="aplicarPolitica(\''+pol+'\')">'+ll.announceBtn+'</button>';
}
function aplicarPolitica(pol,caotica){
  caotica=caotica||false;
  if(pol==='Liberal')G.polLib++;
  else if(pol==='Fascista'){
    G.polFas++;if(G.polFas>=3)G.hitlerZone=true;
    const pod=podFasN(G.polFas);
    if(pod&&!caotica){G.poderPendente=pod;G.fase='poder';logE('Fas:'+pod);renderGame();return;}
  }else if(pol==='Socialista'){
    G.polSoc++;const ps=podSocN(G.polSoc);
    if(ps==='Censura')G.censura=true;
    if(ps&&!caotica){G.poderPendente=ps;G.fase='poder';logE('Soc:'+ps);renderGame();return;}
  }
  const v=checkVit();if(v){showVictory(...v);return;}
  avancarTurno();
}
function politicaCaotica(){
  const ll=L.legislative;
  G.eleicoesNegadas=0;G.ultPresEleito=null;G.ultChanEleito=null;garantirDeck();
  const pol=G.deck.shift();
  document.getElementById('phase-content').innerHTML=
    '<div class="phase-header"><div class="phase-tag">'+ll.chaosPhase+'</div><div class="phase-title">'+ll.chaosTitle+'</div></div>'
    +'<div class="policy-announce '+pol.toLowerCase()+' mt-8"><div class="announce-emoji">⚡</div><div class="announce-type">'+polName(pol).toUpperCase()+'</div></div>'
    +'<div class="text-muted mt-8 text-center">'+ll.chaosMsg+'</div>'
    +'<button class="btn btn-ghost mt-16" onclick="aplicarPolitica(\''+pol+'\',true)">'+ll.announceBtn+'</button>';
  G.fase='legislativa';renderGame();
  document.getElementById('phase-content').innerHTML=document.getElementById('phase-content').innerHTML;
}

// ─────── PODERES ───────
function poderFim(){G.poderPendente=null;G.fase='proximo';renderGame();}
function renderPoder(c){
  const pod=G.poderPendente,pres=G.jogadores[G.presidIdx];
  if(pod==='Investigar')renderInvestigar(c,pres);
  else if(pod==='Espiar')renderEspiar(c,pres);
  else if(pod==='EleicaoEspecial')renderEleicaoEsp(c,pres);
  else if(pod==='Matar')renderMatar(c,pres);
  else if(pod==='Bugging')renderBugging(c);
  else if(pod==='Recrutamento')renderRecrutamento(c);
  else if(pod==='Confissao')renderConfissao(c,pres);

// ─────── AVANÇAR TURNO ───────
function avancarTurno(){
  G.chanceler=null;G.chairman=null;
  if(G.eleicaoEspAtiva){
    G.eleicaoEspAtiva=false;
    let idx=(G.eleicaoEspRetIdx+1)%G.jogadores.length,t=0;
    while(G.mortos.includes(G.jogadores[idx])){idx=(idx+1)%G.jogadores.length;if(++t>G.jogadores.length)break;}
    G.presidIdx=idx;
  }else{G.presidIdx=proxPresIdx();}
  G.turno++;G.fase='nominar';renderGame();
}

// ─────── VITÓRIA ───────
function showVictory(team,reason,icon){
  const cores={Liberal:'#7ab0ff',Fascista:'#ff8080',Socialista:'#80f090'};
  const lv=L.victory;
  document.getElementById('victory-icon').textContent=icon;
  document.getElementById('victory-title').style.color=cores[team]||'var(--gold2)';
  document.getElementById('victory-title').textContent=lv[team]||('VITÓRIA '+team.toUpperCase());
  document.getElementById('victory-reason').textContent=reason;
  document.getElementById('victory-roles').innerHTML=G.jogadores.map(n=>{
    const p=G.papeis[n]||'?',morto=G.mortos.includes(n)?' '+lv.dead:'';
    const conv=G.membros[n]==='Socialista'&&p!=='Socialista'?' <em style="color:#80f090">('+lv.converted+')</em>':'';
    return'<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;"><strong>'+n+'</strong>: '+p+conv+morto+'</div>';
  }).join('');
  showScreen('screen-victory');
}

  }catch(e){}
}
function carregarConfigs(){
  try{
    const raw=localStorage.getItem('sh_config');
    if(!raw)return null;
    const d=JSON.parse(raw);
    if(d.jogadores&&d.jogadores.length)G.jogadores=d.jogadores;
    document.getElementById('cfg-socialista').checked=!!d.cfgSocialista;
    document.getElementById('cfg-passar').checked=d.cfgPassar!==false;
    document.getElementById('cfg-fonte').checked=!!d.cfgFonte;
    G.cfgSocialista=!!d.cfgSocialista;
    G.cfgPassar=d.cfgPassar!==false;
    document.documentElement.classList.toggle('legivel',!!d.cfgFonte);
    return d.lang||null;
  }catch(e){return null;}
}

// ─────── INIT ───────
G.jogadores=['Jogador 1','Jogador 2','Jogador 3','Jogador 4','Jogador 5'];
populateLangSelect();
const savedLang = carregarConfigs();
loadLang(savedLang || 'en');
setupInit();
</script>
</body>
